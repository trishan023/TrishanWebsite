name = "trishantalukdar"
main = "src/worker.js"
compatibility_date = "2026-03-12"

[assets]
directory = "./dist"
binding = "ASSETS"
run_worker_first = true

[[analytics_engine_datasets]]
binding = "AE"
dataset = "site_requests"

[env.preview]
name = "trishantalukdar-preview"

[env.preview.assets]
directory = "./dist"
binding = "ASSETS"
run_worker_first = true

[[env.preview.analytics_engine_datasets]]
binding = "AE"
dataset = "site_requests_preview"
